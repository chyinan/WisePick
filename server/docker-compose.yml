# 快淘帮 WisePick 后端代理服务 Docker Compose 配置
#
# ⚠️  仅包含后端代理服务，适用于已有外部 PostgreSQL 数据库的场景。
# ✅  完整部署（含 PostgreSQL）请使用根目录的 docker-compose.yml：
#       docker-compose -f ../docker-compose.yml up -d
#
# 使用方法（仅后端）:
#   1. 复制并填写 bin/.env 文件中的 API Key 等配置
#   2. docker-compose up -d

services:
  wisepick-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wisepick-proxy-server
    restart: unless-stopped
    ports:
      - "${PORT:-9527}:9527"
    # 从 bin/.env 文件加载所有环境变量
    env_file:
      - ./bin/.env
    # 仅设置服务器必需的基础配置（不覆盖 env_file 中的值）
    environment:
      - PORT=9527
      - BACKEND_BASE=http://localhost:9527
    
    # 资源限制（docker-compose v2 语法，普通 docker compose up 生效）
    mem_limit: 512m
    cpus: 1.0
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9527/__settings"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# 网络配置 (可选，用于多服务部署)
networks:
  default:
    name: wisepick-network
