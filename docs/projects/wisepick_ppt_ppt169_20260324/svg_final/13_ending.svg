      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#004E89"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1280" height="8" fill="#FF6B35"/>

  <!-- 主标题 -->
  <text x="640" y="200" font-family="Microsoft YaHei, Arial, sans-serif" font-size="84" font-weight="bold" text-anchor="middle" fill="url(#titleGradient)">
