  </text>

  
  <polygon points="820,400 860,400 840,420" fill="#004E89" />
  <line x1="820" y1="400" x2="860" y2="400" stroke="#004E89" stroke-width="3" />

  
  <path fill="#F5F5F5" stroke="#2ECC71" stroke-width="3" d="M888,200 H1192 A8,8 0 0 1 1200,208 V592 A8,8 0 0 1 1192,600 H888 A8,8 0 0 1 880,592 V208 A8,8 0 0 1 888,200 Z" />
  <text x="1040" y="260" font-family="Microsoft YaHei, Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#2ECC71">
