  <path fill="#F5F5F5" d="M708,180 H1192 A8,8 0 0 1 1200,188 V572 A8,8 0 0 1 1192,580 H708 A8,8 0 0 1 700,572 V188 A8,8 0 0 1 708,180 Z" />

  
  <rect x="750" y="450" width="80" height="100" fill="#FF6B35" />
