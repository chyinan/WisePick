# 快淘帮 WisePick 完整部署 Docker Compose 配置
#
# ✅  包含 PostgreSQL + 后端代理服务，推荐用于生产/测试部署。
# ⚠️  仅部署后端代理（已有外部数据库）请使用 server/docker-compose.yml
#
# 使用方法:
#   1. 在宿主机设置环境变量（或创建 .env 文件）：
#        JWT_SECRET=your-secret
#        JWT_REFRESH_SECRET=your-refresh-secret
#        TAOBAO_APP_KEY=...  TAOBAO_APP_SECRET=...  TAOBAO_ADZONE_ID=...
#        JD_APP_KEY=...      JD_APP_SECRET=...      JD_UNION_ID=...
#        PDD_CLIENT_ID=...   PDD_CLIENT_SECRET=...  PDD_PID=...
#        ADMIN_PASSWORD=...
#   2. docker-compose up -d
#   3. 查看日志: docker-compose logs -f server


  postgres:
    image: postgres:15-alpine
    container_name: wisepick_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-wisepick}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-wisepick}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: wisepick_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-wisepick}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-wisepick-jwt-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-wisepick-refresh-secret-change-me}
      PORT: 9527
      HOST: 0.0.0.0
      TAOBAO_APP_KEY: ${TAOBAO_APP_KEY:-}
      TAOBAO_APP_SECRET: ${TAOBAO_APP_SECRET:-}
      TAOBAO_ADZONE_ID: ${TAOBAO_ADZONE_ID:-}
      JD_APP_KEY: ${JD_APP_KEY:-}
      JD_APP_SECRET: ${JD_APP_SECRET:-}
      JD_UNION_ID: ${JD_UNION_ID:-}
      PDD_CLIENT_ID: ${PDD_CLIENT_ID:-}
      PDD_CLIENT_SECRET: ${PDD_CLIENT_SECRET:-}
      PDD_PID: ${PDD_PID:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    ports:
      - "9527:9527"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9527/api/v1/reliability/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
