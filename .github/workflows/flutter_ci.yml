name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Flutter 客户端测试 ──────────────────────────────────────────
  flutter-test:
    name: Flutter 测试 & 分析
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 代码静态分析
        run: flutter analyze --no-fatal-infos

      - name: 运行单元测试（含覆盖率）
        run: flutter test --coverage --exclude-tags stress
        env:
          CI: true

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false

  # ── Dart 后端服务测试 ───────────────────────────────────────────
  server-test:
    name: 后端服务测试
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: 安装依赖
        working-directory: server
        run: dart pub get

      - name: 代码静态分析
        working-directory: server
        run: dart analyze --no-fatal-infos

      - name: 运行测试
        working-directory: server
        run: dart test
        env:
          CI: true
